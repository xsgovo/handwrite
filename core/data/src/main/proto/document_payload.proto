syntax = "proto3";

package handwrite.data;

option java_package = "com.xsgovo.handwrite.core.data.proto";
option java_multiple_files = true;
option optimize_for = LITE_RUNTIME;

message StrokePayload {
  string brush_id = 1;
  fixed32 argb = 2;
  uint32 width = 3;
  BrushBlendMode blend_mode = 4;
  PressureSensitivity pressure_sensitivity = 5;
  repeated StrokeSamplePayload samples = 6;
}

message StrokeSamplePayload {
  sint32 delta_x = 1;
  sint32 delta_y = 2;
  uint32 pressure = 3;
  uint32 elapsed_millis = 4;
  optional sint32 tilt_x = 5;
  optional sint32 tilt_y = 6;
}

enum BrushBlendMode {
  BRUSH_BLEND_MODE_UNSPECIFIED = 0;
  BRUSH_BLEND_MODE_SOURCE_OVER = 1;
  BRUSH_BLEND_MODE_HIGHLIGHT = 2;
}

enum PressureSensitivity {
  PRESSURE_SENSITIVITY_UNSPECIFIED = 0;
  PRESSURE_SENSITIVITY_LOW = 1;
  PRESSURE_SENSITIVITY_STANDARD = 2;
  PRESSURE_SENSITIVITY_HIGH = 3;
}

message BackgroundPayload {
  oneof value {
    SolidBackgroundPayload solid = 1;
    TransparentBackgroundPayload transparent = 2;
    PatternBackgroundPayload pattern = 3;
    AssetBackgroundPayload asset = 4;
  }
}

message SolidBackgroundPayload {
  fixed32 argb = 1;
}

message TransparentBackgroundPayload {}

message PatternBackgroundPayload {
  PatternType type = 1;
  fixed32 base_argb = 2;
}

enum PatternType {
  PATTERN_TYPE_UNSPECIFIED = 0;
  PATTERN_TYPE_LINED = 1;
  PATTERN_TYPE_GRID = 2;
}

message AssetBackgroundPayload {
  int64 resource_id = 1;
  BackgroundAssetKind kind = 2;
  optional uint32 pdf_page_index = 3;
  BackgroundTransformPayload transform = 4;
}

enum BackgroundAssetKind {
  BACKGROUND_ASSET_KIND_UNSPECIFIED = 0;
  BACKGROUND_ASSET_KIND_IMAGE = 1;
  BACKGROUND_ASSET_KIND_PDF = 2;
}

message BackgroundTransformPayload {
  uint32 scale_permille = 1;
  sint32 translation_x = 2;
  sint32 translation_y = 3;
  sint32 rotation_milli_degrees = 4;
  optional LogicalRectPayload crop = 5;
}

message LogicalRectPayload {
  sint32 left = 1;
  sint32 top = 2;
  sint32 right = 3;
  sint32 bottom = 4;
}

message PendingCommandPayload {
  string operation_id = 1;
  int64 document_id = 2;
  int64 page_id = 3;
  oneof command {
    ReplaceElementsPayload replace_elements = 4;
    UpdateBackgroundPayload update_background = 5;
  }
  uint64 sequence = 6;
}

message ReplaceElementsPayload {
  repeated ElementEnvelope removed = 1;
  repeated ElementEnvelope added = 2;
}

message UpdateBackgroundPayload {
  BackgroundPayload before = 1;
  BackgroundPayload after = 2;
}

message ElementEnvelope {
  int64 id = 1;
  int64 page_id = 2;
  sint64 order_key = 3;
  ElementType type = 4;
  bytes payload = 5;
}

enum ElementType {
  ELEMENT_TYPE_UNSPECIFIED = 0;
  ELEMENT_TYPE_STROKE = 1;
}
